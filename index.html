<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🥀 Feliz Dia dos Namorados 🥀</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:linear-gradient(
180deg,
#000000,
#140000,
#000000
);

font-family:Georgia, serif;
color:#e5e5e5;
text-align:center;
overflow-x:hidden;
min-height:100vh;
}

.container{
padding:30px 20px;
}

h1{
font-size:2.8rem;
margin-top:20px;
color:#b3002d;
text-shadow:0 0 15px #600;
}

.subtitulo{
margin-top:15px;
font-style:italic;
color:#b0b0b0;
}

.foto{
width:300px;
max-width:90%;
margin-top:30px;
border-radius:12px;
border:2px solid #550000;
box-shadow:0 0 25px rgba(180,0,0,.4);
}

.contador{
margin-top:25px;
font-size:1.2rem;
}

.musica{
margin-top:30px;
}

.video-container{
margin-top:40px;
}

video{
width:90%;
max-width:700px;
border:2px solid #550000;
border-radius:12px;
box-shadow:0 0 20px rgba(180,0,0,.3);
}

.flutuante{
position:fixed;
top:-20px;
pointer-events:none;
animation:cair linear forwards;
}

@keyframes cair{
to{
transform:translateY(110vh);
}
}

footer{
margin-top:50px;
margin-bottom:30px;
color:#888;
font-size:.9rem;
}

</style>
</head>

<body>

<div class="container">

<h1>🥀 Feliz Dia dos Namorados 🥀</h1>

<p class="subtitulo">
Em qualquer universo, eu escolheria você.
</p>

<img src="foto.jpg" class="foto" alt="Nossa foto">

<div class="contador">
🖤 Juntos há <span id="dias"></span> dias 🖤
</div>

<div class="musica">
<h3>🎵 Nossa Música</h3>
<br>

<audio controls>
<source src="musica.mp3" type="audio/mpeg">
Seu navegador não suporta áudio.
</audio>

</div>

<div class="video-container">

<h3>🎥 Nossa História</h3>

<br>

<video controls>
<source src="video.mp4" type="video/mp4">
Seu navegador não suporta vídeo.
</video>

</div>

<footer>
🖤 Feito com amor 🖤
</footer>

</div>

<script>

// TROQUE PELA DATA REAL
const inicio = new Date("2024-01-01");

const hoje = new Date();

const dias = Math.floor(
(hoje - inicio) /
(1000 * 60 * 60 * 24)
);

document.getElementById("dias").innerText = dias;

function criarElemento(){

const simbolos = [
"🖤",
"🥀",
"🌹"
];

const el = document.createElement("div");

el.className = "flutuante";

el.innerHTML =
simbolos[Math.floor(Math.random()*simbolos.length)];

el.style.left =
Math.random()*100 + "vw";

el.style.fontSize =
(20 + Math.random()*20) + "px";

el.style.animationDuration =
(5 + Math.random()*4) + "s";

document.body.appendChild(el);

setTimeout(()=>{
el.remove();
},9000);

}

setInterval(criarElemento,700);

</script>

</body>
</html>
