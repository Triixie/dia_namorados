<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🥀 Feliz Dia dos Namorados 🥀</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:linear-gradient(180deg,#000,#150000,#000);
font-family:Georgia,serif;
color:white;
min-height:100vh;
overflow:hidden;
}

.container{
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:20px;
}

h1{
color:#b3002d;
font-size:2.2rem;
margin-bottom:10px;
text-shadow:0 0 15px #600;
}

.frase{
color:#cfcfcf;
font-style:italic;
margin-bottom:20px;
text-align:center;
}

.barras{
display:flex;
gap:4px;
width:min(90vw,650px);
margin-bottom:15px;
}

.barra{
flex:1;
height:4px;
background:rgba(255,255,255,.15);
border-radius:99px;
}

.barra.ativa{
background:#b3002d;
}

.moldura{
width:min(90vw,650px);
height:min(65vh,700px);
background:#0b0b0b;
border:2px solid #5a0017;
border-radius:18px;
box-shadow:
0 0 25px rgba(179,0,45,.3),
inset 0 0 25px rgba(179,0,45,.15);
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
position:relative;
}

.slide{
display:none;
width:100%;
height:100%;
}

.slide.ativo{
display:flex;
justify-content:center;
align-items:center;
}

.slide img{
width:100%;
height:100%;
object-fit:contain;
background:black;
}

.carta{
padding:35px;
line-height:1.9;
text-align:center;
overflow:auto;
}

.carta h2{
margin-bottom:20px;
color:#b3002d;
}

.nav{
position:absolute;
top:0;
height:100%;
width:50%;
z-index:20;
}

.esquerda{
left:0;
}

.direita{
right:0;
}

.indicacao{
margin-top:15px;
font-size:.9rem;
color:#888;
}

.flutuante{
position:fixed;
top:-30px;
pointer-events:none;
animation:cair linear forwards;
}

@keyframes cair{
to{
transform:translateY(110vh);
}
}

</style>
</head>

<body>

<audio id="musica" autoplay loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<div class="container">

<h1>🥀 Feliz Dia dos Namorados 🥀</h1>

<div class="frase">
Amo dividir minha vida com você 🖤
</div>

<div class="barras">
<div class="barra ativa"></div>
<div class="barra"></div>
<div class="barra"></div>
<div class="barra"></div>
<div class="barra"></div>
<div class="barra"></div>
<div class="barra"></div>
<div class="barra"></div>
<div class="barra"></div>
<div class="barra"></div>
</div>

<div class="moldura">

<div class="slide ativo"><img src="foto1.jpg"></div>
<div class="slide"><img src="foto2.jpg"></div>
<div class="slide"><img src="foto3.jpg"></div>
<div class="slide"><img src="foto4.jpg"></div>
<div class="slide"><img src="foto5.jpg"></div>
<div class="slide"><img src="foto6.jpg"></div>
<div class="slide"><img src="foto7.jpg"></div>
<div class="slide"><img src="foto8.jpg"></div>
<div class="slide"><img src="foto9.jpg"></div>

<div class="slide">
<div class="carta">

<h2>🖤 Para Você 🖤</h2>

<p>
Escreva aqui sua mensagem.

Você pode editar este texto quando quiser,
diretamente no GitHub.

Este espaço foi reservado para a sua carta.

🥀🖤
</p>

</div>
</div>

<div class="nav esquerda" onclick="anterior()"></div>
<div class="nav direita" onclick="proximo()"></div>

</div>

<div class="indicacao">
Toque na direita para avançar • Toque na esquerda para voltar
</div>

</div>

<script>

const slides=document.querySelectorAll(".slide");
const barras=document.querySelectorAll(".barra");

let atual=0;

function atualizar(){

slides.forEach(s=>s.classList.remove("ativo"));
barras.forEach(b=>b.classList.remove("ativa"));

slides[atual].classList.add("ativo");
barras[atual].classList.add("ativa");

}

function proximo(){
if(atual<slides.length-1){
atual++;
atualizar();
}
}

function anterior(){
if(atual>0){
atual--;
atualizar();
}
}

document.addEventListener("click",()=>{
document.getElementById("musica").play();
},{once:true});

function criarElemento(){

const itens=["🖤","🥀","🌹"];

const el=document.createElement("div");

el.className="flutuante";

el.innerHTML=
itens[Math.floor(Math.random()*itens.length)];

el.style.left=Math.random()*100+"vw";

el.style.fontSize=
(18+Math.random()*18)+"px";

el.style.animationDuration=
(6+Math.random()*4)+"s";

document.body.appendChild(el);

setTimeout(()=>{
el.remove();
},10000);

}

setInterval(criarElemento,1200);

</script>

</body>
</html>
